<header class="header">
<div class="navigation">
<a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
<ul class="menu">
<li class="menu__entry"><a href="{{ '/resume' | relative_url }}">Resume</a></li>
<!-- <li class="menu__entry"><a href="{{ '/blog' | relative_url }}">Blog</a></li> -->
</ul>
</div>
<ul class="social-links">
{% if site.author.email %}
<li class="social-links__entry"><a href="mailto:{{ site.author.email }}" aria-label="Email">
<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M2 5h20v14H2V5zm2 2.4V17h16V7.4l-8 5.3-8-5.3zM19.2 7H4.8L12 11.8 19.2 7z"/></svg>

{% endif %}
